# Alembic configuration file
[sqlalchemy]
sqlalchemy.url = driver://user:password@localhost/dbname

[alembic]
sqlalchemy.url = mysql+pymysql://root:password@localhost:3306/cricsauction
script_location = alembic
sqlalchemy.track_modifications = false

[loggers]
keys=root,sqlalchemy.engine

[handlers]
keys=console

[formatters]
keys=generic

[logger_root]
level=WARN
handlers=console
qualname=

[logger_sqlalchemy.engine]
level=WARN
handlers=
qualname=sqlalchemy.engine

[handler_console]
class=StreamHandler
args=(sys.stderr,)
level=NOTSET
formatter=generic

[formatter_generic]
format=%(levelname)-5.5s [%(name)s] %(message)s
datefmt=%H:%M:%S
